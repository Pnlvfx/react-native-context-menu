appId: contextmenu.example
---
- launchApp:
    clearState: true

# Trigger shows on screen
- assertVisible: "Tap or hold"

# Single tap fires onPress without opening context menu
- tapOn: "Tap or hold"
- assertVisible: "Button pressed"
- tapOn: "OK"

# Long press opens the context menu
- longPressOn: "Tap or hold"
- assertVisible: "Share"
- assertVisible: "Copy"
- assertVisible: "Delete"

# Tapping Share fires item onPress
- tapOn: "Share"
- assertVisible: "Share pressed"
- tapOn: "OK"

# Long press again - tap Copy
- longPressOn: "Tap or hold"
- assertVisible: "Copy"
- tapOn: "Copy"
- assertVisible: "Copy pressed"
- tapOn: "OK"

# Long press again - tap Delete (destructive)
- longPressOn: "Tap or hold"
- assertVisible: "Delete"
- tapOn: "Delete"
- assertVisible: "Delete pressed"
- tapOn: "OK"
